spring:
  application:
    name: firesafe-backend

  datasource:
    url: jdbc:mariadb://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:firesafe}?allowPublicKeyRetrieval=true&useSSL=false
    username: ${DB_USER:firesafe}
    password: ${DB_PASSWORD:firesafe}
    driver-class-name: org.mariadb.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MariaDBDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}

server:
  port: ${BACKEND_PORT:8080}

jwt:
  secret: ${JWT_SECRET:change-this-to-a-very-long-random-secret-key-at-least-256-bits}
  expiration-ms: 86400000  # 24 hours

minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:snapshots}

rabbitmq:
  exchange: alert.exchange
  queue:
    notification: alert.notification.queue
  routing-key:
    notification: alert.notification

alert:
  debounce-ttl-seconds: 300  # 5 minutes

firesafe:
  demo-camera:
    name: ${FIRESAFE_DEMO_CAMERA_NAME:Camera RTSP Demo}
    location: ${FIRESAFE_DEMO_CAMERA_LOCATION:Demo}
    rtsp-url: ${FIRESAFE_DEMO_CAMERA_RTSP_URL:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method

telegram:
  enabled: ${TELEGRAM_ENABLED:false}
  bot-token: ${TELEGRAM_BOT_TOKEN:}
  chat-id: ${TELEGRAM_CHAT_ID:}

notification:
  retry:
    max-attempts: 3
    initial-delay-ms: 2000   # 2 giây
    multiplier: 2.0           # exponential: 2s → 4s → 8s
